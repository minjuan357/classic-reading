<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖订餐系统 - 陈氏ER图</title>
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Microsoft YaHei', sans-serif;
            padding: 10px;
        }
        canvas {
            display: block;
            background: white;
            border: 1px solid #e0e0e0;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<canvas id="erCanvas" width="1500" height="900"></canvas>

<script>
    const canvas = document.getElementById('erCanvas');
    const ctx = canvas.getContext('2d');

    // 绘制实体矩形
    function drawEntity(x, y, name) {
        ctx.save();
        ctx.fillStyle = '#a8d8ea';
        ctx.strokeStyle = '#1e88e5';
        ctx.lineWidth = 2;
        ctx.fillRect(x, y, 100, 50);
        ctx.strokeRect(x, y, 100, 50);
        ctx.fillStyle = '#333';
        ctx.font = 'bold 14px Microsoft YaHei';
        ctx.textAlign = 'center';
        ctx.fillText(name, x + 50, y + 25);
        ctx.restore();
        return { x, y, cx: x + 50, cy: y + 25 };
    }

    // 绘制属性椭圆
    function drawAttribute(x, y, name, isPk = false) {
        ctx.save();
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#1e88e5';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(x, y, 40, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = isPk ? '#d32f2f' : '#333';
        ctx.font = isPk ? 'bold 11px Microsoft YaHei' : '11px Microsoft YaHei';
        ctx.textAlign = 'center';
        ctx.fillText(name, x, y);
        if (isPk) {
            ctx.strokeStyle = '#d32f2f';
            ctx.lineWidth = 1.5;
            let tw = ctx.measureText(name).width;
            ctx.beginPath();
            ctx.moveTo(x - tw/2 - 3, y + 8);
            ctx.lineTo(x + tw/2 + 3, y + 8);
            ctx.stroke();
        }
        ctx.restore();
        return { x, y };
    }

    // 绘制关系菱形
    function drawRelationship(x, y, name) {
        ctx.save();
        ctx.fillStyle = '#ffe0b2';
        ctx.strokeStyle = '#ff9800';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x, y - 22);
        ctx.lineTo(x + 22, y);
        ctx.lineTo(x, y + 22);
        ctx.lineTo(x - 22, y);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#333';
        ctx.font = 'bold 12px Microsoft YaHei';
        ctx.textAlign = 'center';
        ctx.fillText(name, x, y);
        ctx.restore();
        return { x, y };
    }

    // 绘制连接线
    function drawLine(x1, y1, x2, y2) {
        ctx.save();
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        ctx.restore();
    }

    // 绘制基数标签
    function drawCardinal(x, y, text) {
        ctx.save();
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1;
        ctx.font = 'bold 12px Arial';
        let tw = ctx.measureText(text).width;
        ctx.fillRect(x - tw/2 - 5, y - 10, tw + 10, 20);
        ctx.strokeRect(x - tw/2 - 5, y - 10, tw + 10, 20);
        ctx.fillStyle = '#333';
        ctx.textAlign = 'center';
        ctx.fillText(text, x, y);
        ctx.restore();
    }

    // ====== 实体布局 ======
    // 第一行（顶部）
    const user = drawEntity(200, 100, '用户');
    const merchant = drawEntity(500, 100, '商家');
    const rider = drawEntity(800, 100, '配送员');

    // 第二行（中间）
    const address = drawEntity(150, 350, '收货地址');
    const order = drawEntity(450, 400, '订单');
    const dish = drawEntity(750, 350, '菜品');

    // 第三行（底部）
    const orderItem = drawEntity(500, 650, '订单详情');
    const review = drawEntity(850, 500, '评价');

    // ====== 属性布局 ======
    // 用户属性（左侧）
    const u1 = drawAttribute(80, 85, 'user_id', true);
    const u2 = drawAttribute(80, 130, 'phone');
    const u3 = drawAttribute(80, 175, 'nickname');
    const u4 = drawAttribute(80, 220, 'role');

    // 商家属性（右侧）
    const m1 = drawAttribute(650, 85, 'merchant_id', true);
    const m2 = drawAttribute(650, 130, 'shop_name');
    const m3 = drawAttribute(650, 175, 'user_id(FK)');
    const m4 = drawAttribute(650, 220, 'verify_status');

    // 配送员属性（右侧）
    const r1 = drawAttribute(950, 85, 'rider_id', true);
    const r2 = drawAttribute(950, 130, 'real_name');
    const r3 = drawAttribute(950, 175, 'id_card');
    const r4 = drawAttribute(950, 220, 'status');

    // 收货地址属性（左侧）
    const a1 = drawAttribute(50, 335, 'address_id', true);
    const a2 = drawAttribute(50, 385, 'detail');
    const a3 = drawAttribute(50, 435, 'receiver_name');
    const a4 = drawAttribute(50, 485, 'user_id(FK)');

    // 订单属性（两侧）
    const o1 = drawAttribute(320, 385, 'order_id', true);
    const o2 = drawAttribute(320, 440, 'total_amount');
    const o3 = drawAttribute(320, 495, 'status');
    const o4 = drawAttribute(630, 385, 'user_id(FK)');
    const o5 = drawAttribute(630, 440, 'merchant_id(FK)');

    // 菜品属性（右侧）
    const d1 = drawAttribute(900, 335, 'dish_id', true);
    const d2 = drawAttribute(900, 385, 'name');
    const d3 = drawAttribute(900, 435, 'price');
    const d4 = drawAttribute(900, 485, 'merchant_id(FK)');

    // 订单详情属性（两侧）
    const oi1 = drawAttribute(350, 635, 'item_id', true);
    const oi2 = drawAttribute(350, 695, 'quantity');
    const oi3 = drawAttribute(350, 755, 'price');
    const oi4 = drawAttribute(680, 635, 'order_id(FK)');
    const oi5 = drawAttribute(680, 695, 'dish_id(FK)');

    // 评价属性（右侧）
    const re1 = drawAttribute(1000, 485, 'review_id', true);
    const re2 = drawAttribute(1000, 545, 'rating');
    const re3 = drawAttribute(1000, 605, 'content');
    const re4 = drawAttribute(1000, 665, 'order_id(FK)');
    const re5 = drawAttribute(1000, 725, 'user_id(FK)');

    // ====== 关系菱形 ======
    const r_own = drawRelationship(275, 230, '拥有');      // 用户-收货地址
    const r_order = drawRelationship(325, 265, '下单');    // 用户-订单
    const r_belong = drawRelationship(575, 230, '归属');   // 订单-商家
    const r_provide = drawRelationship(625, 230, '提供');  // 商家-菜品
    const r_contain = drawRelationship(500, 530, '包含');  // 订单-订单详情
    const r_record = drawRelationship(725, 500, '记录');   // 订单详情-菜品
    const r_deliver = drawRelationship(625, 265, '配送');  // 配送员-订单
    const r_write = drawRelationship(525, 330, '撰写');    // 用户-评价
    const r_correspond = drawRelationship(650, 450, '对应');// 订单-评价

    // ====== 连接属性到实体 ======
    // 用户
    drawLine(user.x, user.cy, u1.x, u1.y);
    drawLine(user.x, user.cy, u2.x, u2.y);
    drawLine(user.x, user.cy, u3.x, u3.y);
    drawLine(user.x, user.cy, u4.x, u4.y);

    // 商家
    drawLine(merchant.x + 100, merchant.cy, m1.x, m1.y);
    drawLine(merchant.x + 100, merchant.cy, m2.x, m2.y);
    drawLine(merchant.x + 100, merchant.cy, m3.x, m3.y);
    drawLine(merchant.x + 100, merchant.cy, m4.x, m4.y);

    // 配送员
    drawLine(rider.x + 100, rider.cy, r1.x, r1.y);
    drawLine(rider.x + 100, rider.cy, r2.x, r2.y);
    drawLine(rider.x + 100, rider.cy, r3.x, r3.y);
    drawLine(rider.x + 100, rider.cy, r4.x, r4.y);

    // 收货地址
    drawLine(address.x, address.cy, a1.x, a1.y);
    drawLine(address.x, address.cy, a2.x, a2.y);
    drawLine(address.x, address.cy, a3.x, a3.y);
    drawLine(address.x, address.cy, a4.x, a4.y);

    // 订单
    drawLine(order.x, order.cy, o1.x, o1.y);
    drawLine(order.x, order.cy, o2.x, o2.y);
    drawLine(order.x, order.cy, o3.x, o3.y);
    drawLine(order.x + 100, order.cy, o4.x, o4.y);
    drawLine(order.x + 100, order.cy, o5.x, o5.y);

    // 菜品
    drawLine(dish.x + 100, dish.cy, d1.x, d1.y);
    drawLine(dish.x + 100, dish.cy, d2.x, d2.y);
    drawLine(dish.x + 100, dish.cy, d3.x, d3.y);
    drawLine(dish.x + 100, dish.cy, d4.x, d4.y);

    // 订单详情
    drawLine(orderItem.x, orderItem.cy, oi1.x, oi1.y);
    drawLine(orderItem.x, orderItem.cy, oi2.x, oi2.y);
    drawLine(orderItem.x, orderItem.cy, oi3.x, oi3.y);
    drawLine(orderItem.x + 120, orderItem.cy, oi4.x, oi4.y);
    drawLine(orderItem.x + 120, orderItem.cy, oi5.x, oi5.y);

    // 评价
    drawLine(review.x + 100, review.cy, re1.x, re1.y);
    drawLine(review.x + 100, review.cy, re2.x, re2.y);
    drawLine(review.x + 100, review.cy, re3.x, re3.y);
    drawLine(review.x + 100, review.cy, re4.x, re4.y);
    drawLine(review.x + 100, review.cy, re5.x, re5.y);

    // ====== 连接实体到关系 ======
    // 用户-拥有-收货地址
    drawLine(user.cx, user.y + 50, r_own.x, r_own.y - 22);
    drawLine(r_own.x, r_own.y + 22, address.cx, address.y);

    // 用户-下单-订单
    drawLine(user.cx, user.y + 50, r_order.x, r_order.y - 22);
    drawLine(r_order.x, r_order.y + 22, order.cx, order.y);

    // 订单-归属-商家
    drawLine(order.cx, order.y, r_belong.x, r_belong.y + 22);
    drawLine(r_belong.x, r_belong.y - 22, merchant.cx, merchant.y + 50);

    // 商家-提供-菜品
    drawLine(merchant.cx, merchant.y + 50, r_provide.x, r_provide.y - 22);
    drawLine(r_provide.x, r_provide.y + 22, dish.cx, dish.y);

    // 订单-包含-订单详情
    drawLine(order.cx, order.y + 50, r_contain.x, r_contain.y - 22);
    drawLine(r_contain.x, r_contain.y + 22, orderItem.cx, orderItem.y);

    // 订单详情-记录-菜品
    drawLine(orderItem.cx, orderItem.y, r_record.x, r_record.y + 22);
    drawLine(r_record.x, r_record.y - 22, dish.cx, dish.y + 50);

    // 配送员-配送-订单
    drawLine(rider.cx, rider.y + 50, r_deliver.x, r_deliver.y - 22);
    drawLine(r_deliver.x, r_deliver.y + 22, order.cx, order.y);

    // 用户-撰写-评价
    drawLine(user.cx + 50, user.y + 50, r_write.x, r_write.y - 22);
    drawLine(r_write.x, r_write.y + 22, review.cx, review.y);

    // 订单-对应-评价
    drawLine(order.cx + 50, order.y + 50, r_correspond.x, r_correspond.y - 22);
    drawLine(r_correspond.x, r_correspond.y + 22, review.cx, review.y);

    // ====== 基数标签 ======
    // 拥有
    drawCardinal(240, 180, '1');
    drawCardinal(310, 280, 'N');

    // 下单
    drawCardinal(290, 210, '1');
    drawCardinal(360, 310, 'N');

    // 归属
    drawCardinal(545, 310, 'N');
    drawCardinal(605, 180, '1');

    // 提供
    drawCardinal(590, 180, '1');
    drawCardinal(660, 280, 'N');

    // 包含
    drawCardinal(475, 470, '1');
    drawCardinal(525, 580, 'N');

    // 记录
    drawCardinal(695, 550, 'N');
    drawCardinal(755, 450, '1');

    // 配送
    drawCardinal(720, 180, '1');
    drawCardinal(570, 310, 'N');

    // 撰写
    drawCardinal(400, 270, '1');
    drawCardinal(560, 380, 'N');

    // 对应
    drawCardinal(580, 400, '1');
    drawCardinal(720, 400, '1');
</script>
</body>
</html>
